syntax = "proto3";

package raft;

service RaftNode {
  // Comunicação interna do Raft
  rpc RequestVote (VoteRequest) returns (VoteResponse);
  rpc AppendEntries (AppendRequest) returns (AppendResponse);

  // Comunicação com o cliente
  rpc PublishData (PublishRequest) returns (PublishResponse);
  rpc ConsumeData (Empty) returns (ConsumeResponse);
}

message LogEntry {
  int32 term = 1;
  string data = 2;
  string hash = 3;
  int32 log_index = 4;
}

message VoteRequest {
  int32 term = 1;
  string candidate_id = 2;
  int32 last_log_index = 3;
  int32 last_log_term = 4;
}

message VoteResponse {
  int32 term = 1;
  bool vote_granted = 2;
}

message AppendRequest {
  int32 term = 1;
  string leader_id = 2;
  int32 prev_log_index = 3;
  int32 prev_log_term = 4;
  repeated LogEntry entries = 5;
  int32 leader_commit = 6;
}

message AppendResponse {
  int32 term = 1;
  bool success = 2;
  int32 conflict_index = 3; // Otimização para reenviar apenas entradas ausentes
  int32 conflict_term = 4;
}

message PublishRequest {
  string data = 1;
}

message PublishResponse {
  bool success = 1;
  string leader_id = 2; // Informa o líder atual em caso de redirecionamento
  string message = 3;
}

message Empty {}

message ConsumeResponse {
  bool success = 1;
  string leader_id = 2;
  repeated string commited_data = 3; // Retorna estritamente dados efetivados
}
